---
layout: default
---

<div class="character-header">
  <h1>{{ page.title }}</h1>
</div>

<div class="character-body">
  {{ content }}
</div>
<style>
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  .tab-btn.active { font-weight: bold; text-decoration: underline; }
  .portrait { max-width: 300px; height: auto; display: block; margin: 0 auto 20px; }
  
 /* Container and portrait */
.portrait-deceased { position: relative; overflow: visible; }
.portrait-deceased .portrait { display: block; width: 100%; height: auto; transition: filter 0.25s ease, opacity 0.25s ease; }

/* Deceased visual mode (applied when the selected book is deceased) */
.portrait-deceased.deceased-mode .portrait {
  opacity: 0.55;
  filter: grayscale(100%) contrast(1.15);
  mix-blend-mode: normal;
}

/* Epitaph overlay (visible when container has data-epitaph) */
.portrait-deceased::after {
  content: attr(data-epitaph);
  position: absolute;
  left: 8px;
  right: 8px;
  bottom: 10px;
  z-index: 999;
  display: block;
  color: #f3f3f3;
  background: rgba(0,0,0,0.62);
  padding: 6px 10px;
  font-family: 'Orbitron', 'Courier New', monospace;
  font-size: 0.95rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  text-align: center;
  border-radius: 6px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.6);
  pointer-events: none;
  opacity: 0;               /* hidden by default */
  transform: translateY(6px);
  transition: opacity 0.2s ease, transform 0.2s ease;
}

/* Show epitaph only when in deceased-mode */
.portrait-deceased.deceased-mode::after {
  opacity: 1;
  transform: translateY(0);
}

/* When portrait is "alive" remove grayscale and make image vivid */
.portrait-deceased:not(.deceased-mode) .portrait {
  opacity: 1;
  filter: none;
}

</style>

{% raw %}
<script>
document.addEventListener('DOMContentLoaded', function () {
  const container = document.getElementById('portrait-container');
  const portrait = document.getElementById('character-portrait');
  const placeholder = '/assets/images/portrait-placeholder.png';

  if (!container || !portrait) return;

  // Build arrays from the hidden spans emitted by Liquid
  const bookAges = {};
  const bookImages = {};
  container.querySelectorAll('span[data-book-index]').forEach(span => {
    const idx = span.dataset.bookIndex;
    bookAges[idx] = (span.dataset.bookAge || '').toString().trim();
    bookImages[idx] = (span.dataset.bookImage || '').toString().trim();
  });

  // Helper: determine if an age string indicates deceased
  function isAgeDeceased(ageStr) {
    if (!ageStr) return false;
    const s = ageStr.toString().trim().toLowerCase();
    return s === 'deceased' || s === 'dead' || s === '—';
  }

  // Find last living book index (fallback initial portrait)
  function getLastLivingBookIndex() {
    for (let i = 5; i >= 1; i--) {
      const a = (bookAges[i] || '').toString().trim().toLowerCase();
      if (a && a !== 'deceased' && a !== '—' && !a.includes('not yet born') && !a.includes('unborn')) {
        return i;
      }
    }
    return null;
  }

  // Initialize: if page status is Deceased, set portrait to last living book and enable deceased-mode
  const pageStatus = (container.dataset.status || '').toLowerCase();
  if (pageStatus === 'deceased') {
    const lastIdx = getLastLivingBookIndex();
    if (lastIdx && bookImages[lastIdx]) {
      portrait.src = bookImages[lastIdx];
    }
    container.classList.add('deceased-mode');
  } else {
    // Not deceased: ensure normal appearance
    container.classList.remove('deceased-mode');
  }

  // Tab integration: listen for clicks on .tab-btn (assumes your tabs use data-book or data-image)
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', function () {
      // Determine which book this tab represents
      const bookIndex = btn.dataset.book || btn.dataset.tab || null;
      // Prefer explicit data-image on the button, else fall back to bookImages
      const explicitImage = btn.dataset.image || btn.getAttribute('data-image') || '';
      const newSrc = explicitImage.trim() || (bookIndex ? (bookImages[bookIndex] || '') : '');

      // If we have a valid image path, set it
      if (newSrc) {
        portrait.src = newSrc;
      } else {
        // fallback to placeholder if portrait missing
        portrait.src = placeholder;
      }

      // Decide whether to show tombstone visuals:
      // If the selected book's age indicates deceased, enable deceased-mode.
      // Otherwise remove deceased-mode so the portrait appears "alive".
      if (bookIndex && isAgeDeceased(bookAges[bookIndex])) {
        container.classList.add('deceased-mode');
      } else {
        container.classList.remove('deceased-mode');
      }
    });
  });

  // Image error fallback
  portrait.addEventListener('error', function () {
    if (!portrait.dataset.fallbacked) {
      portrait.dataset.fallbacked = '1';
      portrait.src = placeholder;
    }
  });
});
</script>

{% endraw %}
