---
layout: default
---

<div class="character-header">
  <h1>{{ page.title }}</h1>
</div>

<div class="character-body">
  {{ content }}
</div>

<style>
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  .tab-btn.active { font-weight: bold; text-decoration: underline; }
  .portrait { max-width: 300px; height: auto; display: block; margin: 0 auto 20px; }
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const tabContainers = document.querySelectorAll('.tab-container');
  const portrait = document.getElementById('character-portrait');
  
  // Capture the initial source. If it's just "/" or empty, set to null. 
  const initialSrc = portrait ? portrait.getAttribute('src') : null;
  const placeholder = "/assets/images/portrait-placeholder.png";
  
  // Helper to check if a path is a "real" image path and not just a root slash
  const isValidPath = (path) => path && path.trim() !== "" && path !== "/" && !path.includes('{{');

  tabContainers.forEach(container => {
    const buttons = container.querySelectorAll('.tab-btn');
    const contents = container.querySelectorAll('.tab-content');

    buttons.forEach(btn => {
      btn.addEventListener('click', () => {
        const target = btn.getAttribute('data-tab');
        const newImage = btn.getAttribute('data-image');

        // 1. Switch active tabs
        buttons.forEach(b => b.classList.remove('active'));
        contents.forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(target).classList.add('active');

        // 2. Switch portrait image with strict validation
        if (portrait) {
          if (isValidPath(newImage)) {
            portrait.src = newImage;
          } else if (isValidPath(initialSrc)) {
            portrait.src = initialSrc;
          } else {
            portrait.src = placeholder;
          }
        }
      });
    });
  });
});
</script>
