---
layout: default
---

<div class="character-header">
  <h1>{{ page.title }}</h1>
</div>

<div class="character-body">
  {{ content }}
</div>

<style>
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  .tab-btn.active { font-weight: bold; text-decoration: underline; }
  .portrait { max-width: 300px; height: auto; display: block; margin: 0 auto 20px; }
</style>

{% raw %}
<script>
document.addEventListener('DOMContentLoaded', function() {
  const tabContainers = document.querySelectorAll('.tab-container');
  const portrait = document.getElementById('character-portrait');
  const placeholder = "/assets/images/portrait-placeholder.png";

  // 1. Function to validate if a string is a real image path
  const isImgValid = (path) => {
    if (!path) return false;
    const cleanPath = path.trim();
    // Rejects empty strings, single slashes, or paths ending in / (likely site root)
    return cleanPath !== "" && cleanPath !== "/" && !cleanPath.endsWith('/') && !cleanPath.includes('{{');
  };

  // 2. Capture and validate the initial character portrait
  const initialSrc = portrait ? portrait.getAttribute('src') : null;
  const fallbackSrc = isImgValid(initialSrc) ? initialSrc : placeholder;

  tabContainers.forEach(container => {
    const buttons = container.querySelectorAll('.tab-btn');
    const contents = container.querySelectorAll('.tab-content');

    buttons.forEach(btn => {
      btn.addEventListener('click', () => {
        const target = btn.getAttribute('data-tab');
        const newImage = btn.getAttribute('data-image');

        // Tab Switching Logic
        buttons.forEach(b => b.classList.remove('active'));
        contents.forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        const targetEl = document.getElementById(target);
        if (targetEl) targetEl.classList.add('active');

        // Portrait Swapping Logic
        if (portrait) {
          if (isImgValid(newImage)) {
            portrait.src = newImage;
          } else {
            portrait.src = fallbackSrc;
          }
        }
      });
    });
  });
});
</script>
{% endraw %}
