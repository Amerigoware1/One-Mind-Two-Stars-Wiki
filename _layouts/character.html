---
layout: default
---
<div class="character-header">
    <h1>{{ page.title }}</h1>
    
    <!-- Main Portrait Image -->
    <img id="main-portrait" src="{{ page.portrait }}" alt="{{ page.title }}">
</div>

<div class="character-body">
    {{ content }}
</div>

<style>
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .tab-btn.active { font-weight: bold; text-decoration: underline; }
    #main-portrait { max-width: 300px; height: auto; display: block; margin: 0 auto 20px; }
</style>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    const tabContainer = document.querySelector('.tab-container');
    if (!tabContainer) return;

    const buttons = tabContainer.querySelectorAll('.tab-btn');
    const contents = document.querySelectorAll('.tab-content');
    const portraitImg = document.getElementById('main-portrait');

    buttons.forEach(btn => {
      btn.addEventListener('click', () => {
        const targetId = btn.getAttribute('data-tab');
        const newPortrait = btn.getAttribute('data-portrait');

        // Update Buttons
        buttons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        // Update Content Panes
        contents.forEach(c => c.classList.remove('active'));
        document.getElementById(targetId).classList.add('active');

        // Update Portrait Image
        if (newPortrait && portraitImg) {
            portraitImg.src = newPortrait;
        }
      });
    });
  });
</script>
