---
layout: default
---

<article class="character">
  <header class="character-header">
    <h1>{{ page.title }}</h1>
  </header>

  <div class="character-content">
    {{ content }}
  </div>

  {% if page.image %}
  <div class="character-image">
    <img src="{{ page.image | relative_url }}" alt="{{ page.title }}">
  </div>
  {% endif %}
</article>

<style>
  .character {
    max-width: 800px;
    margin: 0 auto;
    padding: 2rem;
  }
  .character-header h1 {
    color: #333;
    border-bottom: 2px solid #428bca;
    padding-bottom: 0.5rem;
    margin-bottom: 1.5rem;
  }
  .character-content {
    line-height: 1.6;
    color: #444;
  }
  .character-image {
    text-align: center;
    margin: 2rem 0;
  }
  .character-image img {
    max-width: 100%;
    height: auto;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }
</style>
