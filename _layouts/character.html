<style>
/* Two-column layout */
.character-layout {
  display: grid;
  grid-template-columns: 300px 1fr; /* infobox width + flexible content */
  gap: 2rem;
  max-width: 1200px;
  margin: 0 auto;
  padding: 1.5rem;
}

.character-layout {
  display: grid;
  grid-template-columns: 300px 1fr;
  gap: 2rem;
  max-width: 1200px;
  margin: 0 auto;
  padding: 1.5rem;
}

/* Full width when no infobox  */
.character-layout .character-main.full-width {
  grid-column: 1 / -1;
}

/* Sticky infobox sidebar */
.infobox-sidebar {
  position: sticky;
  top: 1rem; /* distance from viewport top when sticky */
  align-self: start; /* prevents stretching */
  z-index: 100;
}

.infobox {
  background: #0c0028;
  border: 1px solid #1e0a47;
  border-radius: 8px;
  padding: 1rem;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.infobox .portrait-box {
  margin-bottom: 1rem;
}

.infobox .portrait {
  width: 100%;
  height: auto;
  display: block;
  border-radius: 4px;
}

.infobox table {
  width: 100%;
  font-size: 0.95rem;
}

.infobox th {
  text-align: left;
  padding: 0.3rem 0;
  font-weight: 600;
  width: 40%;
}

.infobox td {
  padding: 0.3rem 0;
}

/* Main content area */
.character-main {
  min-width: 0; /* prevents grid overflow */
}

.character-header h1 {
  margin-top: 0;
  margin-bottom: 1.5rem;
}

/* Responsive: stack on mobile */
@media (max-width: 768px) {
  .character-layout {
    grid-template-columns: 1fr;
  }
  
  .infobox-sidebar {
    position: static; /* disable sticky on mobile */
    order: -1; /* keep infobox above content on mobile */
    margin-bottom: 1.5rem;
  }
}

/* Keep your existing tab styles */
.tab-btn { cursor: pointer; padding: 0.4em 0.8em; border: none; background: none; }
.tab-btn.active { font-weight: bold; border-bottom: 2px solid currentColor; }
.tab-content { display: none; }
.tab-content.active { display: block; }
.sr-only { position: absolute !important; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
</style>

{% raw %}
<script>
document.addEventListener('DOMContentLoaded', function () {
  const container = document.getElementById('portrait-container');
  const portrait = document.getElementById('character-portrait');
  const placeholder = '/assets/images/portrait-placeholder.png';

  if (!container || !portrait) {
    console.warn('Portrait elements not found');
    return;
  }

  // Build lookup: book index → image URL from hidden Liquid spans
  const bookImages = {};
  container.querySelectorAll('span[data-book-index]').forEach(span => {
    const idx = span.dataset.bookIndex;
    const img = (span.dataset.bookImage || '').trim();
    if (img) bookImages[idx] = img;
  });

  // Initialize portrait from page front matter (default)
  let currentSrc = portrait.src;

  // Tab button click handler
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', function (e) {
      e.preventDefault();

      // Update tab visual state
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      this.classList.add('active');

      // Switch tab content if data-tab is set
      const targetId = this.dataset.tab;
      if (targetId) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        const targetEl = document.getElementById(targetId);
        if (targetEl) targetEl.classList.add('active');
      }

      // Switch portrait image
      const bookIndex = this.dataset.book;
      const explicitImage = this.dataset.image || this.getAttribute('data-image');

      if (explicitImage && explicitImage.trim()) {
        // Use explicitly defined image on the button
        portrait.src = explicitImage.trim();
      } else if (bookIndex && bookImages[bookIndex]) {
        // Use image from Liquid-emitted book data
        portrait.src = bookImages[bookIndex];
      }
      // If no match, keep current portrait (or could fallback to placeholder)
    });
  });

  // Fallback if portrait image fails to load
  portrait.addEventListener('error', function () {
    if (!portrait.dataset.fallbacked) {
      portrait.dataset.fallbacked = '1';
      portrait.src = placeholder;
    }
  });
});
</script>
{% endraw %}
