---
layout: default
---

<div class="character-header">
  <h1>{{ page.title }}</h1>9
</div>

<div class="character-body">
  {{ content }}
</div>
<div class="infobox" id="portrait-container"
     data-title="{{ page.title }}"
     data-birthyear="{{ page.birthday | date: '%Y' }}"
     data-deathdate="{{ page.death_date }}"
     data-status="{{ page.status | default: '' }}">
  <!-- IMAGE BOX: only this element gets the tombstone visual -->
  <div class="portrait-box portrait-deceased" id="portrait-box"
       data-epitaph="{{ page.title }} • {{ page.birthday | date: '%Y' }} – {{ page.death_date | split: ' ' | first }}">
    <img id="character-portrait" src="{{ page.portrait | relative_url }}" alt="{{ page.title }}" class="portrait">
  </div>

  <table>
    <tr><th>Affiliation</th><td>{{ page.affiliation }}</td></tr>
    <tr><th>Status</th><td>{{ page.status }}</td></tr>
    <tr><th>Birthday</th><td>{{ page.birthday }}</td></tr>
    <tr><th>Death</th><td>{{ page.death_date }}</td></tr>
  </table>

  {%- for i in (1..5) -%}
    <span class="sr-only" aria-hidden="true"
          data-book-index="{{ i }}"
          data-book-age="{{ page["book" | append: i | append: "_age"] | default: '' | escape }}"
          data-book-image="{{ page["portrait-book" | append: i ] | default: page.portrait | relative_url }}"></span>
  {%- endfor -%}
</div>

<style>
/* Image box only */
.portrait-box { position: relative; overflow: visible; display: inline-block; max-width: 300px; }

/* Portrait image */
.portrait-box .portrait { display: block; width: 100%; height: auto; transition: filter 0.25s ease, opacity 0.25s ease; }

/* Deceased visual mode applied to the portrait-box only */
.portrait-box.deceased-mode .portrait {
  opacity: 0.55;
  filter: grayscale(100%) contrast(1.15);
  mix-blend-mode: normal;
}

/* Epitaph overlay attached to the portrait-box */
.portrait-box::after {
  content: attr(data-epitaph);
  position: absolute;
  left: 8px;
  right: 8px;
  bottom: 10px;
  z-index: 999;
  display: block;
  color: #f3f3f3;
  background: rgba(0,0,0,0.62);
  padding: 6px 10px;
  font-family: 'Orbitron', 'Courier New', monospace;
  font-size: 0.95rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  text-align: center;
  border-radius: 6px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.6);
  pointer-events: none;
  opacity: 0;
  transform: translateY(6px);
  transition: opacity 0.2s ease, transform 0.2s ease;
}

/* Show epitaph only when portrait-box has deceased-mode */
.portrait-box.deceased-mode::after {
  opacity: 1;
  transform: translateY(0);
}

/* When portrait-box is not in deceased-mode, image is vivid */
.portrait-box:not(.deceased-mode) .portrait {
  opacity: 1;
  filter: none;
}

/* Small helper for tab visuals if you need it */
.tab-btn.active { font-weight: bold; text-decoration: underline; }
.tab-content { display: none; }
.tab-content.active { display: block; }
</style>

{% raw %}
<script>
document.addEventListener('DOMContentLoaded', function () {
  const container = document.getElementById('portrait-container');
  const portraitBox = document.getElementById('portrait-box');
  const portrait = document.getElementById('character-portrait');
  const placeholder = '/assets/images/portrait-placeholder.png';

  if (!container) { console.warn('portrait-container not found'); return; }
  if (!portraitBox) { console.warn('portrait-box not found'); return; }
  if (!portrait) { console.warn('character-portrait not found'); return; }

  // Build arrays from the hidden spans emitted by Liquid
  const bookAges = {};
  const bookImages = {};
  container.querySelectorAll('span[data-book-index]').forEach(span => {
    const idx = span.dataset.bookIndex;
    bookAges[idx] = (span.dataset.bookAge || '').toString().trim();
    bookImages[idx] = (span.dataset.bookImage || '').toString().trim();
  });

  console.log('bookAges', bookAges);
  console.log('bookImages', bookImages);

  function isAgeDeceased(ageStr) {
    if (!ageStr) return false;
    const s = ageStr.toString().trim().toLowerCase();
    return s === 'deceased' || s === 'dead' || s === '—';
  }

  function getLastLivingBookIndex() {
    for (let i = 5; i >= 1; i--) {
      const a = (bookAges[i] || '').toString().trim().toLowerCase();
      if (a && a !== 'deceased' && a !== '—' && !a.includes('not yet born') && !a.includes('unborn')) {
        return i;
      }
    }
    return null;
  }

  // Initialize based on page status
  const pageStatus = (container.dataset.status || '').toLowerCase();
  if (pageStatus === 'deceased') {
    const lastIdx = getLastLivingBookIndex();
    if (lastIdx && bookImages[lastIdx]) {
      portrait.src = bookImages[lastIdx];
    }
    portraitBox.classList.add('deceased-mode');
  } else {
    portraitBox.classList.remove('deceased-mode');
  }

  // Tab integration
  // Accepts buttons with either data-book="2" or data-image="/path/to/img"
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', function (ev) {
      ev.preventDefault();

      // Visual tab switching
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const target = btn.getAttribute('data-tab');
      if (target) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        const el = document.getElementById(target);
        if (el) el.classList.add('active');
      }

      // Portrait switching
      const bookIndex = btn.dataset.book || btn.dataset.tab || null;
      const explicitImage = btn.dataset.image || btn.getAttribute('data-image') || '';
      const newSrc = explicitImage.trim() || (bookIndex ? (bookImages[bookIndex] || '') : '');

      if (newSrc) portrait.src = newSrc;
      else portrait.src = placeholder;

      // Toggle tombstone only on the portrait-box
      if (bookIndex && isAgeDeceased(bookAges[bookIndex])) {
        portraitBox.classList.add('deceased-mode');
      } else {
        portraitBox.classList.remove('deceased-mode');
      }
    });
  });

  // Fallback if portrait 404s
  portrait.addEventListener('error', function () {
    if (!portrait.dataset.fallbacked) {
      portrait.dataset.fallbacked = '1';
      portrait.src = placeholder;
    }
  });
});
</script>
{% endraw %}
