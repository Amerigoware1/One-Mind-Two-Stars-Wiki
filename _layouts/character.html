---
layout: default
---

<div class="character-header">
  <h1>{{ page.title }}</h1>
</div>

<div class="character-body">
  {{ content }}
</div>
<style>
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  .tab-btn.active { font-weight: bold; text-decoration: underline; }
  .portrait { max-width: 300px; height: auto; display: block; margin: 0 auto 20px; }
  
  /* Tombstone styles */
  .portrait-deceased {
    position: relative;
    background: #2a2a2a;
    background-image: url('/assets/images/tombstone-texture.webp');
    background-blend-mode: overlay;
    border-radius: 8px;
    overflow: hidden;
  }
  
  .portrait-deceased img {
    opacity: 0.4;
    filter: grayscale(100%) contrast(1.2);
    mix-blend-mode: luminosity;
  }
  
  .portrait-deceased::after {
    content: attr(data-epitaph);
    position: absolute;
    bottom: 10px;
    left: 0;
    right: 0;
    text-align: center;
    color: #aaa;
    font-family: 'Courier New', monospace;
    font-size: 0.9rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    text-shadow: 0 0 5px rgba(0,0,0,0.5);
    background: rgba(0,0,0,0.6);
    padding: 4px;
    z-index: 10;
  }
</style>

{% raw %}
<script>
document.addEventListener('DOMContentLoaded', function() {
  const portrait = document.getElementById('character-portrait');
  const portraitContainer = document.querySelector('.infobox');
  const tabContainers = document.querySelectorAll('.tab-container');
  const placeholder = 'https://amerigoware1.github.io/One-Mine-Two-Stars-Wiki/assets/images/portrait-placeholder.png';

  // Helper function to get Jekyll variables safely
  function getJekyllVar(varName) {
    try {
      return "{{ page[varName] }}";
    } catch(e) {
      return '';
    }
  }

  // Get character status from the page
  const characterStatus = "{{ page.status }}";
  
  // Determine last living book for deceased characters
  function getLastLivingBook() {
    const books = [1,2,3,4,5];
    for (let i = books.length - 1; i >= 0; i--) {
      const age = "{{ page[`book${books[i]}_age`] }}";
      if (age && age !== "—" && age !== "Deceased" && !age.includes("Not yet born") && !age.includes("Unborn")) {
        return books[i];
      }
    }
    return null; // No living book found
  }

  // Apply tombstone effect if character is deceased
  if (characterStatus === "Deceased" && portrait && portraitContainer) {
    const lastBook = getLastLivingBook();
    
    // Set tombstone texture
    portraitContainer.classList.add('portrait-deceased');
    
    // Add epitaph with name and dates
    const birthYear = "{{ page.birthday | date: '%Y' }}";
    const deathDate = "{{ page.death_date }}";
    if (deathDate) {
      const deathYear = deathDate.split(',')[0];
      const epitaph = `{{ page.title }} • ${birthYear} – ${deathYear}`;
      portraitContainer.setAttribute('data-epitaph', epitaph);
    }
    
    // Ensure the image is the last living portrait (if we found one)
    if (lastBook) {
      const slug = "{{ page.title | slugify }}";
      portrait.src = `/assets/images/${slug}-book${lastBook}.webp`;
    }
  }

  // Validation helper for image paths
  const isImgValid = (path) => {
    if (!path) return false;
    const clean = path.trim();
    return clean !== "" && clean !== "/" && !clean.endsWith('/') && !clean.includes('{{');
  };

  // Capture the "Primary" image from Front Matter as the first fallback
  const initialSrc = portrait ? portrait.getAttribute('src') : null;

  // Emergency Fallback: Triggers if the file physically doesn't exist (404)
  if (portrait) {
    portrait.addEventListener('error', function() {
      if (portrait.getAttribute('src') !== placeholder) {
        console.warn("Image 404 detected. Falling back to placeholder.");
        portrait.src = placeholder;
      }
    });
  }

  // Tab switching logic
  tabContainers.forEach(container => {
    const buttons = container.querySelectorAll('.tab-btn');
    const contents = container.querySelectorAll('.tab-content');

    buttons.forEach(btn => {
      btn.addEventListener('click', () => {
        const target = btn.getAttribute('data-tab');
        const newImage = btn.getAttribute('data-image');

        // Update Tabs
        buttons.forEach(b => b.classList.remove('active'));
        contents.forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        const targetEl = document.getElementById(target);
        if (targetEl) targetEl.classList.add('active');

        // Update Portrait (only if not deceased - deceased images are fixed)
        if (portrait && characterStatus !== "Deceased") {
          if (isImgValid(newImage)) {
            portrait.src = newImage;
          } else if (isImgValid(initialSrc)) {
            portrait.src = initialSrc;
          } else {
            portrait.src = placeholder;
          }
        }
      });
    });
  });
});
</script>
{% endraw %}
